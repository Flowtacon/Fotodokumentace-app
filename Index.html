        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #F58220;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Vypnutí nativních šipek u datalistu */
        input::-webkit-calendar-picker-indicator {
            opacity: 0;

            -webkit-appearance: none;

    <script>
        document.getElementById('dateOfMeeting').valueAsDate = new Date();

        function updateFileCount() {
            var input = document.getElementById('fileInput');
            var msg = document.getElementById('fileCountMessage');
            
            if(input.files && input.files.length > 0) {
                if(input.files.length > 15) {
                    msg.textContent = "⚠️ Vybráno příliš mnoho fotek (" + input.files.length + "). Maximum je 15.";
                    msg.classList.remove('text-brand-orange');
                    msg.classList.add('text-red-600');
                    document.getElementById('submitBtn').disabled = true;
                    document.getElementById('submitBtn').classList.add('opacity-50', 'cursor-not-allowed');
                } else {
                    msg.textContent = "✅ Vybráno " + input.files.length + " fotek (budou zmenšeny)";
                    msg.classList.remove('text-red-600');
                    msg.classList.add('text-brand-orange');
                    document.getElementById('submitBtn').disabled = false;
                    document.getElementById('submitBtn').classList.remove('opacity-50', 'cursor-not-allowed');
                }
                msg.classList.remove('hidden');
            } else {
                msg.classList.add('hidden');
            }
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            
            var btn = document.getElementById('submitBtn');
            var loader = document.getElementById('loader');
            var msgDiv = document.getElementById('responseMessage');
            var fileInput = document.getElementById('fileInput');
            var compressionStatus = document.getElementById('compressionStatus');

            if (fileInput.files.length === 0) {
                 alert("Musíte vybrat alespoň jednu fotku.");
                 return;
            }
            if (fileInput.files.length > 15) {
                alert("Maximum je 15 fotek.");
                return;
            }

            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            btn.innerHTML = "Zpracovávám fotky...";
            compressionStatus.classList.remove('hidden');
            msgDiv.classList.add('hidden');

            var formData = {
                groupName: document.getElementById('groupInput').value,
                actionName: document.getElementById('actionName').value,
                dateOfMeeting: document.getElementById('dateOfMeeting').value,
                files: [] 
            };

            var filePromises = [];
            for (var i = 0; i < fileInput.files.length; i++) {
                filePromises.push(resizeAndCompressImage(fileInput.files[i]));
            }

            Promise.all(filePromises).then(function(filesData) {
                formData.files = filesData;
                
                compressionStatus.classList.add('hidden');
                loader.classList.remove('hidden');
                btn.innerHTML = "Nahrávám...";

                google.script.run.withSuccessHandler(function(response) {
                    loader.classList.add('hidden');
                    btn.disabled = false;
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                    btn.innerHTML = "ODESLAT FOTKY";
                    
                    msgDiv.classList.remove('hidden');
                    msgDiv.innerHTML = response.message;
                    
                    if (response.success) {
                        msgDiv.className = "p-4 mb-4 text-sm rounded-lg text-center text-green-800 bg-green-50 border border-green-200";
                        document.getElementById("myForm").reset();
                        document.getElementById('dateOfMeeting').valueAsDate = new Date(); 
                        document.getElementById('fileCountMessage').classList.add('hidden');
                    } else {
                        msgDiv.className = "p-4 mb-4 text-sm rounded-lg text-center text-red-800 bg-red-50 border border-red-200";
                    }
                }).withFailureHandler(function(error) {
                    loader.classList.add('hidden');
                    btn.disabled = false;
                    btn.innerHTML = "ODESLAT FOTKY";
                    msgDiv.classList.remove('hidden');
                    msgDiv.className = "p-4 mb-4 text-sm rounded-lg text-center text-red-800 bg-red-50";
                    msgDiv.innerHTML = "Chyba připojení: " + error.message;
                }).processForm(formData);
            });
        }

        function resizeAndCompressImage(file) {
            return new Promise(function(resolve, reject) {
                var reader = new FileReader();
                reader.readAsDataURL(file);
                
                reader.onload = function(event) {
                    var img = new Image();
                    img.src = event.target.result;
                    
                    img.onload = function() {
                        var canvas = document.createElement('canvas');
                        var ctx = canvas.getContext('2d');
                        
                        var MAX_WIDTH = 1920;
                        var MAX_HEIGHT = 1920;
                        var width = img.width;
                        var height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        var dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        var content = dataUrl.split(',')[1];
                        var newName = file.name.substr(0, file.name.lastIndexOf('.')) + ".jpg";

                        resolve({ 
                            data: content, 
                            type: 'image/jpeg', 
                            name: newName 
                        });
                    };
                };
                reader.onerror = function(error) { reject(error); };
            });
        }
    </script>
</body>
</html>
